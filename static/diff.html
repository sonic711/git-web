<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diff Review</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="diff-page">
  <header class="hero">
    <div>
      <h1>Commit Review</h1>
      <p id="diffPageSubtitle">載入差異中...</p>
    </div>
    <div class="inline-actions">
      <button type="button" class="secondary" id="reloadDiffButton">抓取最新差異</button>
      <button type="button" id="confirmReviewButton">人工確認本次同步</button>
      <button type="button" id="pushSelectedCommitsButton">推送已選 Commit</button>
    </div>
  </header>

  <div id="toast" class="toast hidden"></div>
  <div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite" aria-busy="true">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <div id="loadingMessage">作業中...</div>
    </div>
  </div>

  <main class="layout">
    <section class="panel">
      <div id="diffMeta" class="diff-meta-grid"></div>
      <div class="inline-actions diff-toolbar">
        <label class="mini-check">
          <input type="checkbox" id="diffForcePushCheckbox">
          Force Push
        </label>
        <div id="selectedCommitSummary" class="panel-copy">尚未選擇 commit</div>
      </div>
    </section>

    <section class="panel diff-shell">
      <aside class="diff-sidebar">
        <div class="diff-sidebar-head">Ahead Commits</div>
        <div id="diffCommitList" class="diff-file-list"></div>
      </aside>
      <section class="diff-content">
        <div id="diffFileTitle" class="diff-file-title">請從左側選擇 commit</div>
        <div id="diffCommitFilesView" class="viewer">尚未載入 commit 檔案清單</div>
      </section>
    </section>
  </main>

  <script src="/diff-view.js"></script>
</body>
</html>
